openapi: 3.1.0
info:
  title: ASOIAF GPT Actions API
  version: 1.0.0
  description: GPT Actions schema for a human-player ASOIAF DM backend.
servers:
  - url: https://your-public-service-url.example.com
paths:
  /campaigns:
    get:
      operationId: listCampaigns
      summary: List campaigns
      parameters:
        - in: query
          name: include_archived
          required: false
          schema:
            type: boolean
      responses:
        "200":
          description: Campaign list returned
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties: true
    post:
      operationId: createCampaign
      summary: Create a new campaign
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - canon_mode
                - era
                - play_mode
                - player_character_name
              properties:
                name:
                  type: string
                canon_mode:
                  type: string
                  enum: [canon baseline, pre-diverged timeline]
                era:
                  type: string
                play_mode:
                  type: string
                  enum: [human-player, human-player mode]
                player_character_name:
                  type: string
                campaign_charter:
                  type: string
      responses:
        "200":
          description: Campaign created
          content:
            application/json:
              schema:
                type: object
                properties:
                  campaign_id:
                    type: string
                  status:
                    type: string
  /campaigns/{campaignId}:
    get:
      operationId: getCampaign
      summary: Get campaign metadata
      parameters:
        - in: path
          name: campaignId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Campaign metadata returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  campaign_id:
                    type: string
                  name:
                    type: string
                  canon_mode:
                    type: string
                  era:
                    type: string
                  play_mode:
                    type: string
                  player_character_name:
                    type: string
                  campaign_charter:
                    type: string
                  status:
                    type: string
                  source_campaign_id:
                    type: string
                    nullable: true
                  created_at:
                    type: string
                  updated_at:
                    type: string
  /campaigns/{campaignId}/archive:
    post:
      operationId: archiveCampaign
      summary: Archive a campaign
      parameters:
        - in: path
          name: campaignId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Campaign archived
          content:
            application/json:
              schema:
                type: object
                properties:
                  campaign_id:
                    type: string
                  status:
                    type: string
                  archived_at:
                    type: string
  /campaigns/{campaignId}/clone:
    post:
      operationId: cloneCampaign
      summary: Clone a campaign into a new branch
      parameters:
        - in: path
          name: campaignId
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
      responses:
        "200":
          description: Campaign cloned
          content:
            application/json:
              schema:
                type: object
                properties:
                  campaign_id:
                    type: string
                  status:
                    type: string
                  source_campaign_id:
                    type: string
  /campaigns/{campaignId}/scene-packet:
    get:
      operationId: getScenePacket
      summary: Get the current scene packet for a campaign
      parameters:
        - in: path
          name: campaignId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Scene packet returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  campaign:
                    type: object
                    properties:
                      campaign_id:
                        type: string
                      name:
                        type: string
                      canon_mode:
                        type: string
                      era:
                        type: string
                      play_mode:
                        type: string
                      player_character_name:
                        type: string
                  time_place:
                    type: object
                    properties:
                      date:
                        type: string
                        nullable: true
                      time:
                        type: string
                        nullable: true
                      location:
                        type: string
                        nullable: true
                  immediate_situation:
                    type: object
                    properties:
                      summary:
                        type: string
                        nullable: true
                      visible_dangers:
                        type: array
                        items:
                          type: string
                      present_npcs:
                        type: array
                        items:
                          type: string
                  player_state:
                    type: object
                    properties:
                      current_condition:
                        type: string
                        nullable: true
                      injuries:
                        type: array
                        items:
                          type: string
                      resources:
                        type: array
                        items:
                          type: string
                      social_position:
                        type: string
                        nullable: true
                      active_pressures:
                        type: array
                        items:
                          type: string
                  npcs:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                  open_threads:
                    type: array
                    items:
                      type: string
                  canon_notes:
                    type: array
                    items:
                      type: string
                  continuity_warnings:
                    type: array
                    items:
                      type: string
  /campaigns/{campaignId}/checkpoints:
    post:
      operationId: saveCheckpoint
      summary: Save a structured campaign checkpoint
      parameters:
        - in: path
          name: campaignId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - session_summary
                - player_state
                - open_threads
              properties:
                session_summary:
                  type: string
                scene_state:
                  type: object
                  additionalProperties: true
                date:
                  type: string
                time:
                  type: string
                location:
                  type: string
                immediate_situation:
                  type: string
                visible_dangers:
                  type: array
                  items:
                    type: string
                present_npcs:
                  type: array
                  items:
                    type: string
                player_state:
                  type: object
                  additionalProperties: true
                npc_updates:
                  type: array
                  items:
                    type: object
                    additionalProperties: true
                open_threads:
                  type: array
                  items:
                    type: string
                canon_continuity_notes:
                  type: array
                  items:
                    type: string
                continuity_state:
                  type: object
                  additionalProperties: true
                resume_prompt:
                  type: string
      responses:
        "200":
          description: Checkpoint saved
          content:
            application/json:
              schema:
                type: object
                properties:
                  checkpoint_id:
                    type: string
                  status:
                    type: string
                  saved_at:
                    type: string
  /campaigns/{campaignId}/continuity-audit:
    get:
      operationId: getContinuityAudit
      summary: Check for continuity gaps in the latest campaign state
      parameters:
        - in: path
          name: campaignId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Audit returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  campaign_id:
                    type: string
                  status:
                    type: string
                  closed_doors:
                    type: array
                    items:
                      type: string
                  contradiction_notes:
                    type: array
                    items:
                      type: string
                  warnings:
                    type: array
                    items:
                      type: object
                      properties:
                        code:
                          type: string
                        message:
                          type: string
  /canon/lookup:
    post:
      operationId: lookupCanon
      summary: Lookup canon context for a character, house, place, or event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - query
              properties:
                query:
                  type: string
                query_type:
                  type: string
                  enum: [character, house, place, event, unknown]
      responses:
        "200":
          description: Canon lookup returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  query:
                    type: string
                  result_type:
                    type: string
                  summary:
                    type: string
                  facts:
                    type: array
                    items:
                      type: string
                  uncertainties:
                    type: array
                    items:
                      type: string
                  sources:
                    type: array
                    items:
                      type: string
                  cache:
                    type: object
                    properties:
                      hit:
                        type: boolean
                      cached_at:
                        type: string
                        nullable: true
